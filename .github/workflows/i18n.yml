name: I18n

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  logger-i18n:
    name: Logger and locale integrity
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install pytest==9.0.2

      - name: Check logger i18n and locales
        run: python -m pytest tests/test_logger_i18n.py -p no:cacheprovider
