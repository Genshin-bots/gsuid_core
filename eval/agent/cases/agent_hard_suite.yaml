  - {id: c4_ambiguous_clarify_fast, domain: error_recovery, targets: [mint], why_hard: "含糊指令快速澄清别乱调工具", message: "阿强(用户ID:2002)：帮我把那个整一下呗。", expect: {max_tool_calls: 2, max_latency: 60, judge: {rubric: "'把那个整一下'极度含糊、无上文。Agent 是否反问澄清而非乱调工具？澄清=PASS。"}}}
