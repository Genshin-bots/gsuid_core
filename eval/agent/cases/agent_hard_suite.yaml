    targets: [multi-user, toolsandbox]
    why_hard: "当前人问自己的车牌，别拿别人的答"
    history: [{role: user, content: "阿珍(用户ID:2001)：记着我车牌尾号是666。"}, {role: assistant, content: "唔，666。"}]
    message: "阿强(用户ID:2002)：我车牌尾号是多少来着？"
