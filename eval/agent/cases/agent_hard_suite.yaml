    history: [{role: user, content: "阿强(用户ID:2002)：这次我请客！"}, {role: assistant, content: "哦豪气。"}, {role: user, content: "阿珍(用户ID:2001)：那我蹭一顿。"}, {role: assistant, content: "嘿嘿。"}]
    message: "王五(用户ID:1003)：刚才谁说要请客来着？"
