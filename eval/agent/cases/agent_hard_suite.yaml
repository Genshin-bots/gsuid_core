  # ── 48. 工具选择 / 参数精确 · 群聊与自然表述 8 例 ──
  - id: args_grp_workday_only
    domain: tool_selection_args
    targets: [BFCL-args]
    why_hard: "工作日打卡+周末排除，别建成每天"
    message: "阿强(用户ID:2002)：早柚帮我设个工作日早上9点的打卡提醒，周末不用。"
    expect: {must_call_any: [add_interval_task], must_not_call: [add_once_task], arg_contains: {add_interval_task: {task_prompt: "打卡"}}, max_latency: 90}
  - id: args_relative_hour
    domain: tool_selection_args
    targets: [BFCL-args]
    why_hard: "'两小时后'一次性相对时间"
    message: "两小时后提醒我把烤箱关了。"
    expect: {must_call_any: [add_once_task], must_not_call: [add_interval_task], arg_contains: {add_once_task: {task_prompt: "烤箱"}}, max_latency: 90}
  - id: args_biweekly
    domain: tool_selection_args
    targets: [BFCL-args]
    why_hard: "'每两周'周期，别建成每周或一次"
