    history: [{role: user, content: "阿珍(用户ID:2001)：聚餐定在周六晚上。"}, {role: assistant, content: "哦。"}, {role: user, content: "阿强(用户ID:2002)：不对，是周日中午吧。"}, {role: assistant, content: "唔……"}]
    message: "王五(用户ID:1003)：那聚餐到底啥时候？"
    expect: {max_latency: 90, judge: {rubric: "两人对聚餐时间说法矛盾(周六晚vs周日午)、无定论。Agent 是否指出说法不一致/请澄清，而非武断咬定一个？指出矛盾=PASS。"}}
  - id: mus_latest_correction_speaker
    domain: multi_user_session
    targets: [multi-user, longmemeval]
    why_hard: "同一人自我纠正取最新，且不与他人混"
    history: [{role: user, content: "阿珍(用户ID:2001)：我在杭州工作。"}, {role: assistant, content: "嗯。"}, {role: user, content: "阿强(用户ID:2002)：我在武汉。"}, {role: assistant, content: "哦。"}, {role: user, content: "阿珍(用户ID:2001)：哦对了我上个月调去南京了。"}, {role: assistant, content: "唔，南京。"}]
    message: "阿珍(用户ID:2001)：我现在在哪个城市工作来着？"
    expect: {max_latency: 90, final_contains_any: ["南京"], judge: {rubric: "阿珍杭州→南京(最新)，阿强武汉。当前阿珍问自己。Agent 是否答南京(而非杭州或武汉)？答南京=PASS。"}}
