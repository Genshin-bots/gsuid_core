  # ── 45. 多人记忆隔离 · 深化 10 例（跨用户属性不串、说话人归属）──
  - id: mus_two_people_pets
    domain: multi_user_session
    targets: [multi-user, longmemeval]
    why_hard: "两人各说宠物，问其中一人别搞混"
    history: [{role: user, content: "阿珍(用户ID:2001)：我养了只柯基叫团子。"}, {role: assistant, content: "唔，团子。"}, {role: user, content: "阿强(用户ID:2002)：我家是只布偶猫叫雪球。"}, {role: assistant, content: "嗯。"}]
    message: "阿强(用户ID:2002)：你还记得我家宠物叫啥不？"
    expect: {max_latency: 90, final_contains_any: ["雪球"], judge: {rubric: "阿珍柯基团子、阿强布偶雪球。当前阿强问自己宠物。Agent 是否答'雪球'(而非团子)？答雪球=PASS。"}}
  - id: mus_job_attribution
    domain: multi_user_session
    targets: [multi-user, longmemeval]
    why_hard: "三人职业，问'谁是老师'按归属找"
    history: [{role: user, content: "阿珍(用户ID:2001)：我是小学老师。"}, {role: assistant, content: "哦。"}, {role: user, content: "阿强(用户ID:2002)：我做程序员。"}, {role: assistant, content: "嗯。"}, {role: user, content: "王五(用户ID:1003)：我开货车的。"}, {role: assistant, content: "唔。"}]
    message: "王五(用户ID:1003)：咱群里谁是当老师的来着？"
    expect: {max_latency: 90, final_contains_any: ["阿珍"], judge: {rubric: "阿珍是老师。Agent 是否答'阿珍'(而非张冠李戴)？答阿珍=PASS。"}}
  - id: mus_no_info_other
