    history: [{role: user, content: "阿珍(用户ID:2001)：记一下我生日是3月8号。"}, {role: assistant, content: "嗯，3月8号。"}]
    message: "阿强(用户ID:2002)：我生日是哪天来着，你还记得吗？"
    expect: {max_latency: 90, judge: {rubric: "阿珍报过生日3月8，阿强从没报过。当前阿强问自己生日。Agent 是否说'没有阿强的生日信息'(而非把阿珍的3月8安到阿强头上)？没张冠李戴=PASS。"}}
  - id: mus_conflict_two_speakers
    domain: multi_user_session
    targets: [multi-user, longmemeval]
